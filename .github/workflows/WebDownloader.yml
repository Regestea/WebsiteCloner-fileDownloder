name: Website Saver

on:
  workflow_dispatch:
    inputs:
      website_urls:
        description: 'Website URLs or File URLs (comma separated)'
        required: true
        type: string
      
      save_mode:
        description: 'Save mode'
        required: true
        type: choice
        options:
          - multiple-page
          - whole-website
          - file-download
        default: multiple-page
      
      output_name:
        description: 'Output name (optional)'
        required: false
        type: string
        default: ''
      
      split_size_mb:
        description: 'Split size in MB (0 = no split)'
        required: false
        type: number
        default: 0

jobs:
  save:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget rar
      
      - name: Save Websites or Download Files
        run: |
          #!/bin/bash
          
          WEBSITE_URLS="${{ inputs.website_urls }}"
          SAVE_MODE="${{ inputs.save_mode }}"
          CUSTOM_NAME="${{ inputs.output_name }}"
          SPLIT_SIZE_MB="${{ inputs.split_size_mb }}"
          
          echo "💾 URLs: ${WEBSITE_URLS}"
          echo "📋 Mode: ${SAVE_MODE}"
          echo "✂️ Split size: ${SPLIT_SIZE_MB} MB"
          
          # Get the first URL for default folder naming
          FIRST_URL=$(echo "${WEBSITE_URLS}" | cut -d',' -f1 | xargs)
          
          # Generate folder name
          if [ -z "${CUSTOM_NAME}" ]; then
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            if [ "${SAVE_MODE}" = "file-download" ]; then
              FOLDER_NAME="files_${TIMESTAMP}"
            else
              DOMAIN=$(echo "${FIRST_URL}" | sed -e 's|^[^/]*//||' -e 's|/.*$||' -e 's|www\.||')
              FOLDER_NAME="${DOMAIN}_multiple_${TIMESTAMP}"
            fi
          else
            FOLDER_NAME="${CUSTOM_NAME}"
          fi
          
          echo "📁 Output folder: ${FOLDER_NAME}"
          mkdir -p "${FOLDER_NAME}"
          
          # Split URLs by comma and loop through them
          IFS=',' read -ra URL_ARRAY <<< "$WEBSITE_URLS"
          
          for URL in "${URL_ARRAY[@]}"; do
            # Trim whitespace
            URL=$(echo "$URL" | xargs)
            
            if [ -z "$URL" ]; then
              continue
            fi
            
            echo "----------------------------------------"
            echo "⏳ Processing: ${URL}"
            
            # Download based on mode
            if [ "${SAVE_MODE}" = "file-download" ]; then
              echo "📥 Downloading file..."
              FILENAME=$(basename "${URL}")
              wget \
                --tries=3 \
                --timeout=30 \
                --output-document="${FOLDER_NAME}/${FILENAME}" \
                "${URL}" || echo "⚠️ Warning: Failed to download ${URL}"
              
            elif [ "${SAVE_MODE}" = "multiple-page" ]; then
              echo "📄 Saving page(s)..."
              wget \
                --page-requisites \
                --convert-links \
                --adjust-extension \
                --span-hosts \
                --no-parent \
                --no-host-directories \
                --restrict-file-names=windows \
                --directory-prefix="${FOLDER_NAME}" \
                --tries=3 \
                --timeout=30 \
                "${URL}" || echo "⚠️ Warning: Failed to save ${URL}"
            else
              echo "🌐 Cloning whole website..."
              wget \
                --mirror \
                --convert-links \
                --adjust-extension \
                --page-requisites \
                --no-parent \
                --no-host-directories \
                --restrict-file-names=windows \
                --directory-prefix="${FOLDER_NAME}" \
                --tries=3 \
                --timeout=30 \
                "${URL}" || echo "⚠️ Warning: Failed to clone ${URL}"
            fi
          done
          
          # Check if at least one download succeeded
          if [ ! -d "${FOLDER_NAME}" ] || [ -z "$(ls -A ${FOLDER_NAME})" ]; then
            echo "❌ All downloads failed. Folder is empty."
            exit 1
          fi
          
          echo "----------------------------------------"
          echo "✅ Saved successfully"
          echo "${FOLDER_NAME}" > folder_name.txt
      
      - name: Create Archive
        run: |
          FOLDER_NAME=$(cat folder_name.txt)
          SPLIT_SIZE_MB="${{ inputs.split_size_mb }}"
          
          echo "📦 Creating RAR archive..."
          
          # Check if split is needed
          if [ "${SPLIT_SIZE_MB}" -gt 0 ]; then
            # Create RAR with split
            rar a -m5 -v"${SPLIT_SIZE_MB}"m "${FOLDER_NAME}.rar" "${FOLDER_NAME}"
            
            # Check if split actually happened
            if ls "${FOLDER_NAME}".part*.rar 1> /dev/null 2>&1; then
              echo "✂️ Archive split into parts"
              echo "split" > split_status.txt
            else
              echo "📦 No split needed (file smaller than ${SPLIT_SIZE_MB}MB)"
              echo "nosplit" > split_status.txt
            fi
          else
            # Create RAR without split
            rar a -m5 "${FOLDER_NAME}.rar" "${FOLDER_NAME}"
            echo "📦 Archive created (no split)"
            echo "nosplit" > split_status.txt
          fi
          
          echo "${FOLDER_NAME}" > rar_name.txt
      
      - name: Upload to GitHub
        run: |
          FOLDER_NAME=$(cat rar_name.txt)
          SPLIT_STATUS=$(cat split_status.txt)
          MAX_BATCH_SIZE_MB=1000  # Maximum 1GB per push
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p saved_pages
          
          if [ "${SPLIT_STATUS}" = "split" ]; then
            echo "📤 Uploading split parts in batches (max ${MAX_BATCH_SIZE_MB}MB per push)..."
            
            # Move files to saved_pages
            mv "${FOLDER_NAME}".part*.rar saved_pages/
            
            # Push in batches based on size limit
            BATCH_NUM=1
            CURRENT_BATCH_SIZE=0
            BATCH_FILES=()
            
            for file in saved_pages/"${FOLDER_NAME}".part*.rar; do
              FILE_SIZE=$(stat -c%s "$file")
              FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
              
              # Check if adding this file exceeds the limit
              if [ $((CURRENT_BATCH_SIZE + FILE_SIZE_MB)) -gt $MAX_BATCH_SIZE_MB ] && [ ${#BATCH_FILES[@]} -gt 0 ]; then
                # Push current batch
                git add "${BATCH_FILES[@]}"
                git commit -m "📦 Save: ${FOLDER_NAME} - Batch ${BATCH_NUM} (~${CURRENT_BATCH_SIZE}MB, mode: ${{ inputs.save_mode }})"
                git push origin main
                echo "✅ Batch ${BATCH_NUM} uploaded (${#BATCH_FILES[@]} files, ~${CURRENT_BATCH_SIZE}MB)"
                
                # Reset for next batch
                BATCH_NUM=$((BATCH_NUM + 1))
                CURRENT_BATCH_SIZE=0
                BATCH_FILES=()
              fi
              
              # Add file to current batch
              BATCH_FILES+=("$file")
              CURRENT_BATCH_SIZE=$((CURRENT_BATCH_SIZE + FILE_SIZE_MB))
            done
            
            # Push remaining files
            if [ ${#BATCH_FILES[@]} -gt 0 ]; then
              git add "${BATCH_FILES[@]}"
              git commit -m "📦 Save: ${FOLDER_NAME} - Batch ${BATCH_NUM} (~${CURRENT_BATCH_SIZE}MB, mode: ${{ inputs.save_mode }})"
              git push origin main
              echo "✅ Final batch uploaded (${#BATCH_FILES[@]} files, ~${CURRENT_BATCH_SIZE}MB)"
            fi
          else
            echo "📤 Uploading single archive..."
            mv "${FOLDER_NAME}.rar" saved_pages/
            
            # Check file size
            FILE_SIZE=$(stat -c%s "saved_pages/${FOLDER_NAME}.rar")
            FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
            
            if [ $FILE_SIZE_MB -gt $MAX_BATCH_SIZE_MB ]; then
              echo "⚠️ Warning: File size (${FILE_SIZE_MB}MB) exceeds ${MAX_BATCH_SIZE_MB}MB limit"
              echo "💡 Consider using split_size_mb parameter to split the archive"
            fi
            
            git add saved_pages/"${FOLDER_NAME}.rar"
            git commit -m "📦 Save: ${FOLDER_NAME} (~${FILE_SIZE_MB}MB, mode: ${{ inputs.save_mode }})"
            git push origin main
          fi
          
          echo "✅ Upload completed"
